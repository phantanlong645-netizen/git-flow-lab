name: CI

on:
  push:
    branches: [main, dev, test]
  pull_request:
    branches: [main, dev, test]

permissions:
  contents: read

jobs:
  validate-readme:
    name: Validate README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README
        run: |
          test -s README.md
          grep -q '^# Git Flow Lab$' README.md
